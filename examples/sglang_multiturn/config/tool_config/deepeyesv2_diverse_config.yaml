# Combined tool config for the full DeepEyesV2 tool set.
# Loads all 4 tools: image_zoom_in_tool, code_interpreter, search, image_search.
tools:
  # --- Operation Tools ---
  - class_name: "verl.tools.image_zoom_in_tool.ImageZoomInTool"
    config:
      num_workers: 20
      enable_global_rate_limit: true
      rate_limit: 50
      timeout: 30
      type: native
    tool_schema:
      type: "function"
      function:
        name: "image_zoom_in_tool"
        description: "Zoom in on a specific region of an image by cropping it based on a bounding box (bbox) and an optional object label."
        parameters:
          type: "object"
          properties:
            bbox_2d:
              type: "array"
              items:
                type: "number"
              minItems: 4
              maxItems: 4
              description: "The bounding box of the region to zoom in, as [x1, y1, x2, y2], where (x1, y1) is the top-left corner and (x2, y2) is the bottom-right corner."
            label:
              type: "string"
              description: "The name or label of the object in the specified bounding box (optional)."
          required: ["bbox_2d"]

  - class_name: "verl.tools.code_tool.CodeExecuteTool"
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "code_interpreter"
        description: "A tool for executing code."
        parameters:
          type: "object"
          properties:
            code:
              type: "string"
              description: "The code to execute."
          required: ["code"]

  # --- Information Retrieval Tools ---
  - class_name: "verl.tools.search_tool.SearchTool"
    config:
      num_workers: 120
      enable_global_rate_limit: true
      rate_limit: 120
      timeout: 30
      retrieval_service_url: "${SEARCH_SERVICE_URL:}"
      topk: 5
      type: native
    tool_schema:
      type: "function"
      function:
        name: "search"
        description: "Searches the web for relevant information based on the given query."
        parameters:
          type: "object"
          properties:
            query_list:
              type: "array"
              items:
                type: "string"
              description: "A list of fully-formed semantic queries. The tool will return search results for each query."
          required: ["query_list"]

  - class_name: "verl.tools.image_search_tool.ImageSearchTool"
    config:
      num_workers: 20
      enable_global_rate_limit: true
      rate_limit: 20
      cache_json_paths: []
      serpapi_key: null
      max_results: 5
      type: native
    tool_schema:
      type: "function"
      function:
        name: "image_search"
        description: "Performs a reverse image search using the most recent image in the conversation, returning visually similar web results with thumbnail images and source titles."
        parameters:
          type: "object"
          properties: {}
          required: []
